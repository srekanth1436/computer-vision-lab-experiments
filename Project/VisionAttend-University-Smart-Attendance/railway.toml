[build]
builder = "RAILPACK"

[deploy]
preDeployCommand = "python init_db.py"
startCommand = "gunicorn --bind 0.0.0.0:$PORT --worker-class gthread --workers 1 --threads 4 --timeout 180 app:app"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
